name: Windows Build

on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Conan
      run: pip install conan && conan profile detect

    - name: Run Build Script
      run: .\build.bat
    
    - name: Run Exec Tests
      shell: pwsh
      run: |
        $exePath = Get-ChildItem -Path "build" -Filter "babel_client.exe" -Recurse | Select-Object -ExpandProperty FullName -First 1
        
        if (-not $exePath) {
            Write-Error "Could not find babel_client.exe in the build directory."
            exit 1
        }

        $process = Start-Process -FilePath $exePath -ArgumentList "--test" -NoNewWindow -Wait -PassThru

        if ($process.ExitCode -ne 0) {
            Write-Error "Binary exited with error code $($process.ExitCode)"
            exit 1
        }


    - name: Upload Test
      uses: actions/upload-artifact@v4
      with:
        name: babel-client-windows
        path: build/client/Release/babel_client.exe