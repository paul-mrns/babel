name: Windows Build

on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Conan
      run: pip install conan && conan profile detect

    - name: Run Build Script
      run: .\build.bat
    
    - name: Run Smoke Test
      shell: pwsh
      run: |
        New-Item -Path . -Name "stderr.txt" -ItemType "file" -Force
        $stderrPath = Join-Path (Get-Location) "stderr.txt"

        $exePath = Get-ChildItem -Path "build" -Filter "babel_client.exe" -Recurse | Select-Object -ExpandProperty FullName -First 1
        
        if (-not $exePath) {
            Write-Error "Could not find babel_client.exe in the build directory."
            exit 1
        }

        $process = Start-Process -FilePath $exePath -ArgumentList "--test" -NoNewWindow -Wait -PassThru -RedirectStandardError $stderrPath

        if ($process.ExitCode -ne 0) {
            Write-Error "Binary exited with error code $($process.ExitCode)"
            if (Test-Path $stderrPath) { Get-Content $stderrPath }
            exit 1
        }

